@if (isLoading()) {
  <div class="animate-pulse space-y-3">
    <div class="h-10 bg-gray-200 rounded"></div>
    <div class="h-10 bg-gray-200 rounded"></div>
    <div class="h-10 bg-gray-200 rounded"></div>
  </div>
} @else if (federalStates().length === 0) {
  <p class="text-gray-500 text-sm" i18n="@@baseData.federalStates.empty">
    No federal states found.
  </p>
} @else {
  <div class="overflow-hidden border border-gray-200 rounded-lg">
    <table class="min-w-full divide-y divide-gray-200">
      <thead class="bg-gray-50">
        <tr>
          <th
            scope="col"
            class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider"
            i18n="@@baseData.federalStates.columnName"
          >
            Name
          </th>
          <th
            scope="col"
            class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider"
            i18n="@@baseData.federalStates.columnIsoCode"
          >
            ISO 3166-2 Code
          </th>
        </tr>
      </thead>
      <tbody class="bg-white divide-y divide-gray-200">
        @for (state of federalStates(); track state.id) {
          <tr class="hover:bg-gray-50 transition-colors">
            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">
              {{ state.name }}
            </td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
              <code class="bg-gray-100 px-2 py-0.5 rounded text-xs font-mono">{{ state.iso3166Code }}</code>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
}

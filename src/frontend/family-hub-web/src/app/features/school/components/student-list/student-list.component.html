<div class="space-y-3">
  @if (isLoading) {
    <div class="animate-pulse space-y-3">
      <div class="h-16 bg-gray-200 rounded"></div>
      <div class="h-16 bg-gray-200 rounded"></div>
    </div>
  } @else if (students.length === 0) {
    <p class="text-gray-500 text-sm" i18n="@@school.students.noStudents">
      No students found. Mark a family member as a student to get started.
    </p>
  } @else {
    @for (student of students; track student.id) {
      <div class="flex items-center gap-3 p-4 bg-white border rounded-lg">
        <div
          class="flex-shrink-0 w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-sm font-medium text-blue-700"
        >
          {{ student.memberName.charAt(0).toUpperCase() }}
        </div>
        <p class="font-medium text-gray-900">{{ student.memberName }}</p>
      </div>
    }
  }
</div>
